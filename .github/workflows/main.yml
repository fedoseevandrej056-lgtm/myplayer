name: Build and Deploy iOS & Android (FINAL FIX)

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  FLUTTER_VERSION: '3.19.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-14
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.1'
        
    - name: FIX iOS Platform Files
      run: |
        # Remove broken ios folder
        rm -rf ios
        # Recreate with proper structure
        flutter create . --platforms=ios --org com.fedoseevmusic
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Install CocoaPods (FIXED)
      run: |
        cd ios
        rm -rf Pods
        rm -rf Podfile.lock
        pod install --repo-update
        cd ..
        
    - name: Build iOS app (unsigned)
      run: flutter build ios --release --no-codesign
        
    - name: Package unsigned IPA
      run: |
        mkdir -p Payload
        cp -r build/ios/iphoneos/Runner.app Payload/
        zip -vr app-unsigned.ipa Payload/
        
    - name: Upload iOS build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa-unsigned
        path: app-unsigned.ipa
        retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: FIX Android Platform Files
      run: |
        # Remove broken android folder
        rm -rf android
        # Recreate with proper structure
        flutter create . --platforms=android --org com.fedoseevmusic
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Make gradlew executable
      run: chmod +x android/gradlew
        
    - name: Build APK (FIXED)
      run: flutter build apk --release
      
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
