name: god_tier_music_player
description: "A God-Tier Aesthetic Music Player with Liquid-Glass UI and elite animations."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core Audio (compatible with Flutter 3.19.0+)
  just_audio: ^0.9.40
  
  # State Management (compatible version)
  flutter_riverpod: ^2.4.9
  
  # UI Components
  cupertino_icons: ^1.0.6
  
  # Device Features (compatible versions)
  sensors_plus: ^3.0.2
  haptic_feedback: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
